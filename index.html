<!DOCTYPE html>
<html>
<head>
    <title>My Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">

        <div class="display">
            <p>125 +15</p>
            <h1>140</h1>
        </div>

        <div class="row">
            <button class="special">AC</button>
            <button class="special">DEL</button>
            <button class="operator">%</button>
            <button class="operator">÷</button>
        </div>

        <div class="row">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">×</button>
        </div>

        <div class="row">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">−</button>
        </div>

        <div class="row">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        </div>

        <div class="row">
            <button class="zero">0</button>
            <button>.</button>
            <button class="equal">=</button>
        </div>

    </div>

</body>
</html>
